<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Uploader NS Data — Settepi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
  :root{
    --bg:#f8fafc; --surface:#ffffff; --border:#e2e8f0;
    --green:#16a34a; --green-dim:#bbf7d0; --red:#dc2626;
    --yellow:#d97706; --text:#1e293b; --muted:#94a3b8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2.5rem;width:100%;max-width:580px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
  .logo{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem;}
  .logo-dot{width:10px;height:10px;border-radius:50%;background:var(--green);}
  .logo-text{font-family:'IBM Plex Mono',monospace;font-size:.85rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
  h1{font-size:1.4rem;font-weight:700;margin-bottom:.4rem;}
  .subtitle{color:var(--muted);font-size:.875rem;margin-bottom:2rem;}
  .dropzone{border:2px dashed var(--border);border-radius:10px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
  .dropzone:hover,.dropzone.drag{border-color:var(--green);background:rgba(74,222,128,.04);}
  .dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .dz-icon{font-size:2.5rem;margin-bottom:.75rem;}
  .dz-label{font-size:.95rem;font-weight:600;margin-bottom:.3rem;}
  .dz-sub{font-size:.8rem;color:var(--muted);}
  .file-info{display:none;align-items:center;gap:1rem;padding:1rem;background:rgba(74,222,128,.07);border:1px solid var(--green-dim);border-radius:8px;margin-top:1rem;}
  .file-info.show{display:flex;}
  .file-icon{font-size:1.8rem;}
  .file-name{font-weight:600;font-size:.9rem;word-break:break-all;}
  .file-meta{font-size:.78rem;color:var(--muted);margin-top:.2rem;}
  .config{margin-top:1.5rem;}
  .config label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.06em;}
  .config-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
  .config select,.config input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.6rem .8rem;border-radius:7px;font-size:.875rem;font-family:inherit;outline:none;transition:border .2s;}
  .config select:focus,.config input:focus{border-color:var(--green);}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:1.5rem;}
  .btn{padding:.85rem;border-radius:8px;border:none;cursor:pointer;font-size:.9rem;font-weight:700;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-primary:hover:not(:disabled){background:#15803d;transform:translateY(-1px);}
  .btn-secondary{background:#fff;color:var(--green);border:1.5px solid var(--green);}
  .btn-secondary:hover:not(:disabled){background:rgba(22,163,74,.06);transform:translateY(-1px);}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .progress-wrap{margin-top:1.5rem;display:none;}
  .progress-wrap.show{display:block;}
  .progress-bar-bg{background:var(--border);border-radius:99px;height:6px;overflow:hidden;}
  .progress-bar{height:100%;background:var(--green);border-radius:99px;transition:width .3s;width:0%;}
  .progress-label{font-size:.8rem;color:var(--muted);margin-top:.5rem;font-family:'IBM Plex Mono',monospace;}
  .log{margin-top:1.5rem;max-height:180px;overflow-y:auto;display:none;}
  .log.show{display:block;}
  .log-line{font-family:'IBM Plex Mono',monospace;font-size:.75rem;padding:.25rem 0;border-bottom:1px solid var(--border);display:flex;gap:.75rem;}
  .log-line:last-child{border:none;}
  .log-line .ts{color:var(--muted);flex-shrink:0;}
  .log-line.ok .msg{color:var(--green);}
  .log-line.err .msg{color:var(--red);}
  .log-line.warn .msg{color:var(--yellow);}
  .success-banner{display:none;margin-top:1.5rem;padding:1.2rem;background:rgba(74,222,128,.1);border:1px solid var(--green-dim);border-radius:8px;text-align:center;}
  .success-banner.show{display:block;}
  .success-banner .s-icon{font-size:2rem;margin-bottom:.5rem;}
  .success-banner .s-title{font-weight:700;color:var(--green);margin-bottom:.25rem;}
  .success-banner .s-sub{font-size:.82rem;color:var(--muted);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">Settepi · NS Data · Neon DB</span>
  </div>
  <h1>Actualizar datos NS</h1>
  <p class="subtitle">Arrastra el Excel para subirlo a Neon o descargar el catálogo de unidades.</p>

  <div class="dropzone" id="dz">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="dz-icon">📂</div>
    <div class="dz-label">Arrastra tu Excel aquí</div>
    <div class="dz-sub">o haz click para seleccionar · .xlsx / .xls</div>
  </div>

  <div class="file-info" id="fileInfo">
    <div class="file-icon">📊</div>
    <div>
      <div class="file-name" id="fileName">—</div>
      <div class="file-meta" id="fileMeta">—</div>
    </div>
  </div>

  <div class="config">
    <div class="config-row">
      <div>
        <label>Hoja del Excel</label>
        <input type="text" id="sheetName" value="NS" placeholder="NS">
      </div>
      <div>
        <label>Tabla en Neon</label>
        <select id="tableName">
          <option value="ns_data">ns_data</option>
        </select>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="uploadBtn" disabled>
      <span id="btnIcon">⬆️</span>
      <span id="btnText">Subir a Neon</span>
    </button>
    <button class="btn btn-secondary" id="catalogBtn" disabled>
      <span id="catIcon">📥</span>
      <span id="catText">Catálogo Unidades</span>
    </button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label" id="progressLabel">Preparando...</div>
  </div>

  <div class="log" id="logBox"></div>

  <div class="success-banner" id="successBanner">
    <div class="s-icon">✅</div>
    <div class="s-title" id="successTitle">¡Listo!</div>
    <div class="s-sub" id="successSub">—</div>
  </div>
</div>

<script>
'use strict';

// ── Neon config ──────────────────────────────────────────────────
const NEON_HOST  = 'ep-royal-dream-ambqsb0c.c-5.us-east-1.aws.neon.tech';
const NEON_DB    = 'neondb';
const NEON_USER  = 'neondb_owner';
const NEON_PASS  = 'npg_ealfC5pOxMB0';
const NEON_URL   = `https://${NEON_HOST}/sql`;
const BATCH_SIZE = 200;

async function neonQuery(query, params=[]){
  const connStr=`postgresql://${NEON_USER}:${NEON_PASS}@${NEON_HOST}/${NEON_DB}?sslmode=require`;
  const res = await fetch(NEON_URL, {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Neon-Connection-String': connStr
    },
    body: JSON.stringify({query, params})
  });
  if(!res.ok){ const t=await res.text(); throw new Error(`Neon ${res.status}: ${t}`); }
  return await res.json();
}

// ── Helpers UI ───────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function addLog(msg, type='info'){
  const box=document.getElementById('logBox');
  box.classList.add('show');
  const now=new Date();
  const ts=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const line=document.createElement('div');
  line.className=`log-line ${type}`;
  line.innerHTML=`<span class="ts"></span><span class="msg"></span>`;
  line.querySelector('.ts').textContent=ts;
  line.querySelector('.msg').textContent=msg;
  box.prepend(line);
}
function setProgress(pct, label){
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=label;
}
function showSuccess(title, sub){
  document.getElementById('successTitle').textContent=title;
  document.getElementById('successSub').textContent=sub;
  document.getElementById('successBanner').classList.add('show');
}

// ── Helpers de datos ─────────────────────────────────────────────
function dateToISO(v){
  if(!v) return '';
  if(v instanceof Date){ return `${v.getFullYear()}-${pad(v.getMonth()+1)}-${pad(v.getDate())}`; }
  const s=String(v).trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m) return `${m[3]}-${pad(m[2])}-${pad(m[1])}`;
  return s.slice(0,10);
}
function countViajes(v){ const n=parseInt(v)||0; return n>0?n:1; }
function findSheet(wb, ...patterns){
  for(const pat of patterns){
    const re=pat instanceof RegExp?pat:new RegExp(`^${pat}$`,'i');
    const found=wb.SheetNames.find(n=>re.test(n));
    if(found) return found;
  }
  return null;
}

// ── File handling ────────────────────────────────────────────────
let selectedFile=null;
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)handleFile(f);});
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});

function handleFile(file){
  selectedFile=file;
  document.getElementById('fileInfo').classList.add('show');
  document.getElementById('fileName').textContent=file.name;
  document.getElementById('fileMeta').textContent=`${(file.size/1024/1024).toFixed(2)} MB · ${new Date(file.lastModified).toLocaleDateString('es-MX')}`;
  document.getElementById('uploadBtn').disabled=false;
  document.getElementById('catalogBtn').disabled=false;
  document.getElementById('btnText').textContent='Subir a Neon';
  document.getElementById('catText').textContent='Catálogo Unidades';
  document.getElementById('btnIcon').textContent='⬆️';
  document.getElementById('catIcon').textContent='📥';
  document.getElementById('successBanner').classList.remove('show');
  document.getElementById('logBox').innerHTML='';
  document.getElementById('logBox').classList.remove('show');
  document.getElementById('progressWrap').classList.remove('show');
}

// ── Subir a Neon (lógica original intacta) ───────────────────────
document.getElementById('uploadBtn').addEventListener('click', async ()=>{
  if(!selectedFile) return;
  const sheetName=document.getElementById('sheetName').value.trim()||'NS';
  const tableName=document.getElementById('tableName').value||'ns_data';
  const btn=document.getElementById('uploadBtn');
  const catBtn=document.getElementById('catalogBtn');
  btn.disabled=true; catBtn.disabled=true;
  document.getElementById('btnIcon').textContent='⏳';
  document.getElementById('btnText').textContent='Subiendo...';
  document.getElementById('progressWrap').classList.add('show');
  document.getElementById('successBanner').classList.remove('show');

  try{
    addLog(`Leyendo: ${selectedFile.name}`);
    setProgress(5,'Leyendo Excel...');
    const buffer=await selectedFile.arrayBuffer();
    const wb=XLSX.read(new Uint8Array(buffer),{type:'array',cellDates:true,dateNF:'YYYY-MM-DD'});
    const ws=wb.Sheets[sheetName];
    if(!ws) throw new Error(`No se encontró la hoja "${sheetName}". Hojas: ${wb.SheetNames.join(', ')}`);
    const rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
    if(!rows.length) throw new Error(`La hoja "${sheetName}" está vacía.`);
    addLog(`${rows.length.toLocaleString()} filas · ${Object.keys(rows[0]).length} columnas`,'ok');
    setProgress(15,`${rows.length.toLocaleString()} filas encontradas...`);

    // Sanitizar nombres de columnas
    const rawCols=Object.keys(rows[0]);
    const cols=rawCols.map(c=>c.trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .toLowerCase()
      .replace(/\s+/g,'_')
      .replace(/[^a-z0-9_]/g,'_')
      .replace(/_+/g,'_')
      .replace(/_$/,'')
      .replace(/^(\d)/,'c$1'));
    addLog(`Cols: ${cols.slice(0,5).join(', ')}${cols.length>5?' +'+(cols.length-5)+' más':''}`);

    // Detectar columna de fecha
    const dateColRaw = rawCols.find(c => c.trim().toLowerCase() === 'start_date')
                    || rawCols.find(c => c.trim().toLowerCase().includes('start_date'));
    const dateColSan = dateColRaw ? cols[rawCols.indexOf(dateColRaw)] : null;

    const uniqueDates = [...new Set(rows.map(r => {
      const v = r[dateColRaw];
      if(!v) return null;
      if(v instanceof Date){
        return `${v.getFullYear()}-${pad(v.getMonth()+1)}-${pad(v.getDate())}`;
      }
      return String(v).slice(0,10);
    }).filter(Boolean))];

    setProgress(22,'Verificando tabla...');
    const colDefs=cols.map(c=>`"${c}" TEXT`).join(', ');
    await neonQuery(`CREATE TABLE IF NOT EXISTS ${tableName} (${colDefs})`);

    if(uniqueDates.length && dateColSan){
      setProgress(26,'Borrando fechas existentes...');
      const placeholders=uniqueDates.map((_,i)=>`$${i+1}`).join(',');
      await neonQuery(`DELETE FROM ${tableName} WHERE "${dateColSan}" IN (${placeholders})`, uniqueDates);
      addLog(`Fechas borradas: ${uniqueDates.join(', ')}`,'warn');
    } else {
      addLog('No se detectó columna start_date — se inserta sin borrar','warn');
    }

    setProgress(30,'Insertando datos...');
    const total=rows.length;
    let inserted=0;

    for(let i=0;i<total;i+=BATCH_SIZE){
      const batch=rows.slice(i,i+BATCH_SIZE);
      const colNames=cols.map(c=>`"${c}"`).join(',');
      const placeholders=batch.map((_,ri)=>{
        const offset=ri*cols.length;
        return '('+cols.map((_,ci)=>`$${offset+ci+1}`).join(',')+')'
      }).join(',');
      const values=batch.flatMap(row=>rawCols.map(rc=>{
        const v=row[rc];
        if(v===null||v===undefined||v==='') return null;
        if(v instanceof Date){
          return `${v.getFullYear()}-${pad(v.getMonth()+1)}-${pad(v.getDate())}`;
        }
        return String(v);
      }));
      await neonQuery(`INSERT INTO ${tableName} (${colNames}) VALUES ${placeholders}`,values);
      inserted+=batch.length;
      const pct=30+Math.round((inserted/total)*68);
      setProgress(pct,`Insertando: ${inserted.toLocaleString()} / ${total.toLocaleString()} filas...`);
    }

    setProgress(100,'¡Listo!');
    addLog(`✅ ${inserted.toLocaleString()} filas insertadas`,'ok');
    showSuccess('¡Datos actualizados!', `${inserted.toLocaleString()} filas en "${tableName}" · ${new Date().toLocaleString('es-MX')}`);
    document.getElementById('btnIcon').textContent='✅';
    document.getElementById('btnText').textContent='Subir otro archivo';
    btn.disabled=false; catBtn.disabled=false;

  }catch(e){
    addLog(`ERROR: ${e.message}`,'err');
    setProgress(0,'Error — revisa el log');
    document.getElementById('btnIcon').textContent='⬆️';
    document.getElementById('btnText').textContent='Reintentar';
    btn.disabled=false; catBtn.disabled=false;
    console.error(e);
  }
});

// ── Generar Catálogo de Unidades (descarga) ──────────────────────
document.getElementById('catalogBtn').addEventListener('click', async ()=>{
  if(!selectedFile) return;
  const btn=document.getElementById('uploadBtn');
  const catBtn=document.getElementById('catalogBtn');
  btn.disabled=true; catBtn.disabled=true;
  document.getElementById('catIcon').textContent='⏳';
  document.getElementById('catText').textContent='Generando...';
  document.getElementById('progressWrap').classList.add('show');
  document.getElementById('successBanner').classList.remove('show');

  try{
    addLog(`Leyendo: ${selectedFile.name}`);
    setProgress(5,'Leyendo Excel...');
    const buffer=await selectedFile.arrayBuffer();
    const wb=XLSX.read(new Uint8Array(buffer),{type:'array',cellDates:true,dateNF:'YYYY-MM-DD'});

    // ── Detectar hojas ──
    const vfSheet    = findSheet(wb, /^vf$/i, /^ns$/i, /viajes/i, /datos/i);
    const flotaSheet = findSheet(wb, /^flota$/i, /flota/i);
    const inputsSheet= findSheet(wb, /^inputs?$/i, /^entrada/i, /coordinadores?/i);

    if(!vfSheet) throw new Error(`No se encontró hoja VF/NS. Hojas: ${wb.SheetNames.join(', ')}`);
    addLog(`Hojas: VF="${vfSheet}"${flotaSheet?', Flota="'+flotaSheet+'"':''}${inputsSheet?', Inputs="'+inputsSheet+'"':''}`);

    // ── Cargar VF ──
    setProgress(15,'Leyendo viajes...');
    const DATA = XLSX.utils.sheet_to_json(wb.Sheets[vfSheet],{defval:'',raw:false});
    if(!DATA.length) throw new Error('La hoja de viajes está vacía.');
    addLog(`Viajes: ${DATA.length.toLocaleString()} filas`,'ok');

    // ── Cargar Flota ──
    const FLOTA_MAP={};
    if(flotaSheet){
      XLSX.utils.sheet_to_json(wb.Sheets[flotaSheet],{defval:''}).forEach(r=>{
        const id=String(r['IDS']||r['ID']||r['id']||'').trim();
        if(id) FLOTA_MAP[id]={
          planta:String(r['PLANTA']||r['Planta']||'').trim(),
          estatus:String(r['Estatus']||'').trim(),
        };
      });
      addLog(`Flota: ${Object.keys(FLOTA_MAP).length} unidades activas`,'ok');
    } else {
      addLog('Sin hoja Flota — no se filtran carros activos.','warn');
    }

    // ── Cargar Inputs (dos tablas paralelas independientes) ──
    setProgress(25,'Leyendo coordinadores...');
    const COORD_RAW=[], JEFE_BY_CLIENTE={}, GERENTE_BY_CLIENTE={};
    if(inputsSheet){
      const ir=XLSX.utils.sheet_to_json(wb.Sheets[inputsSheet],{defval:''});
      ir.forEach(r=>{
        const keys=Object.keys(r);
        // Tabla 1: CLIENTE → Jefe / Gerente
        const cliKey=keys.find(k=>k.trim().toUpperCase()==='CLIENTE');
        const jeKey =keys.find(k=>k.trim().toUpperCase()==='JEFE');
        const gerKey=keys.find(k=>k.trim().toUpperCase()==='GERENTE');
        if(cliKey){
          const cli=String(r[cliKey]||'').trim();
          if(cli){
            if(jeKey){ const je=String(r[jeKey]||'').trim();  if(je) JEFE_BY_CLIENTE[cli]=je; }
            if(gerKey){ const ge=String(r[gerKey]||'').trim(); if(ge) GERENTE_BY_CLIENTE[cli]=ge; }
          }
        }
        // Tabla 2: CLIENTE COOR → COORDINADOR
        const ccKey=keys.find(k=>k.trim().toUpperCase().replace(/\s+/g,'').includes('CLIENTECOOR'));
        const coKey=keys.find(k=>k.trim().toUpperCase()==='COORDINADOR');
        if(ccKey&&coKey){
          const cc=String(r[ccKey]||'').trim();
          const co=String(r[coKey]||'').trim();
          if(cc&&co) COORD_RAW.push({cc,co});
        }
      });
      addLog(`Inputs: ${COORD_RAW.length} reglas coord · ${Object.keys(JEFE_BY_CLIENTE).length} jefes · ${Object.keys(GERENTE_BY_CLIENTE).length} gerentes`,'ok');
    } else {
      addLog('Sin hoja Inputs — coordinador y jefe quedarán vacíos.','warn');
    }

    // ── buildCoordMap (idéntico al dashboard) ──
    setProgress(40,'Asignando coordinadores...');
    if(COORD_RAW.length){
      const clientNames=new Set(DATA.map(r=>String(r['group']||'').trim()).filter(Boolean));
      const assign={};
      COORD_RAW.forEach(({cc,co})=>{
        if(clientNames.has(cc)){
          if(!assign[cc]) assign[cc]={__default:co};
          else assign[cc].__default=co;
        } else {
          let found=null;
          for(const cli of clientNames){
            if(cc.length>cli.length&&cc.startsWith(cli+'-')){ found=cli; break; }
          }
          if(found){
            if(!assign[found]) assign[found]={__default:null};
            const prefix=cc.slice(found.length+1).toUpperCase();
            assign[found][prefix]=co;
          }
        }
      });
      DATA.forEach(r=>{
        const client=String(r['group']||'').trim();
        const route =String(r['des']||'').trim().toUpperCase();
        const entry =assign[client]; if(!entry) return;
        let coord=entry.__default||'';
        for(const [pfx,co] of Object.entries(entry)){
          if(pfx==='__default') continue;
          if(route.startsWith(pfx+'-')||route.startsWith(pfx+' ')||route===pfx){ coord=co; break; }
        }
        if(coord) r['Coordinador']=coord;
      });
      // Pase 2: fallback por carro
      const carCoordCount={};
      DATA.forEach(r=>{
        const co=String(r['Coordinador']||'').trim();
        const car=String(r['car']||'').trim();
        if(!co||!car) return;
        if(!carCoordCount[car]) carCoordCount[car]={};
        carCoordCount[car][co]=(carCoordCount[car][co]||0)+countViajes(r['Cantidad de viajes']);
      });
      // Pase 3: fallback por cliente
      const cliCoordCount={};
      DATA.forEach(r=>{
        const co=String(r['Coordinador']||'').trim();
        const cli=String(r['group']||'').trim();
        if(!co||!cli) return;
        if(!cliCoordCount[cli]) cliCoordCount[cli]={};
        cliCoordCount[cli][co]=(cliCoordCount[cli][co]||0)+countViajes(r['Cantidad de viajes']);
      });
      function topEntry(obj){
        if(!obj) return '';
        const e=Object.entries(obj).sort((a,b)=>b[1]-a[1])[0];
        return e?e[0]:'';
      }
      DATA.forEach(r=>{
        if(String(r['Coordinador']||'').trim()) return;
        const car=String(r['car']||'').trim();
        const cli=String(r['group']||'').trim();
        const resolved = (car?topEntry(carCoordCount[car]):'') || (cli?topEntry(cliCoordCount[cli]):'');
        if(resolved) r['Coordinador']=resolved;
      });
    }

    // ── Asignar Jefe y Gerente por CLIENTE directo ──
    if(Object.keys(JEFE_BY_CLIENTE).length){
      DATA.forEach(r=>{
        const cli=String(r['group']||'').trim();
        if(!cli) return;
        if(JEFE_BY_CLIENTE[cli])    r['Jefe']=JEFE_BY_CLIENTE[cli];
        if(GERENTE_BY_CLIENTE[cli]) r['Gerente']=GERENTE_BY_CLIENTE[cli];
      });
    }

    // ── Filtrar filas con jefe inválido (igual que dashboard) ──
    setProgress(60,'Agrupando por carro...');
    const rows = Object.keys(JEFE_BY_CLIENTE).length
      ? DATA.filter(r=>{
          const jefe=String(r['Jefe']||'').trim();
          return jefe && !jefe.startsWith('#');
        })
      : DATA;

    // ── Agrupar por carro → coordinador ──
    const bycar={};
    rows.forEach(r=>{
      const carro=String(r['car']||'').trim(); if(!carro) return;
      if(!bycar[carro]) bycar[carro]={coords:{}};
      const coord=String(r['Coordinador']||'').trim()||'(Sin asignar)';
      if(!bycar[carro].coords[coord])
        bycar[carro].coords[coord]={viajes:0,clientes:{},rutas:{},jefes:{},operadores:{},workerIds:{}};
      const v=countViajes(r['Cantidad de viajes']);
      const d=bycar[carro].coords[coord];
      d.viajes+=v;
      const cli=String(r['group']||'').trim();    if(cli) d.clientes[cli]=(d.clientes[cli]||0)+v;
      const ruta=String(r['des']||'').trim();     if(ruta)d.rutas[ruta]=(d.rutas[ruta]||0)+v;
      const jefe=String(r['Jefe']||'').trim();    if(jefe)d.jefes[jefe]=(d.jefes[jefe]||0)+v;
      const ope=String(r['operador']||'').trim(); if(ope) d.operadores[ope]=(d.operadores[ope]||0)+v;
      const wid=String(r['worker_id']||'').trim();if(wid) d.workerIds[wid]=(d.workerIds[wid]||0)+v;
    });

    function top(obj){ return Object.entries(obj).sort((a,b)=>b[1]-a[1])[0]?.[0]||''; }

    setProgress(80,'Construyendo catálogo...');
    const catalog=Object.entries(bycar).map(([carro,data])=>{
      const coord=top(Object.fromEntries(
        Object.entries(data.coords).map(([c,d])=>[c,d.viajes])
      ));
      const d=data.coords[coord]||{clientes:{},rutas:{},jefes:{},operadores:{},workerIds:{}};
      return {
        carro, coord,
        cliente:  top(d.clientes),
        ruta:     top(d.rutas),
        jefe:     top(d.jefes),
        operador: top(d.operadores),
        workerId: top(d.workerIds),
      };
    });

    // ── Filtrar por Flota activa ──
    const flotaKeys=Object.keys(FLOTA_MAP);
    const catalogFinal=flotaKeys.length
      ? catalog.filter(r=>FLOTA_MAP[r.carro])
      : catalog;
    if(flotaKeys.length){
      addLog(`Flota: ${catalogFinal.length} activos · ${catalog.length-catalogFinal.length} fuera de catálogo`,'ok');
    }

    if(!catalogFinal.length) throw new Error('Catálogo vacío después de cruzar con Flota.');

    // ── Generar Excel ──
    setProgress(92,'Generando Excel...');
    const dataRows=catalogFinal.map(r=>[r.cliente,r.ruta,r.jefe,r.coord,r.carro,r.workerId,r.operador]);
    dataRows.sort((a,b)=>String(a[0]).localeCompare(String(b[0]))||String(a[1]).localeCompare(String(b[1])));

    const header=['PLANTA','RUTA','JEFE','COORDINADOR','ID VEH','NOMINA OP','NOMBRE OP'];
    const wsData=[header,...dataRows];
    const ws=XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols']=[{wch:26},{wch:38},{wch:24},{wch:26},{wch:10},{wch:14},{wch:34}];

    const wb2=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb2,ws,'Catálogo Unidades');

    const today=new Date();
    const tag=`${today.getFullYear()}${pad(today.getMonth()+1)}${pad(today.getDate())}`;
    const fileName=`Catalogo_Unidades_${tag}.xlsx`;
    XLSX.writeFile(wb2,fileName);

    setProgress(100,'¡Descargado!');
    addLog(`✅ ${catalogFinal.length} carros → ${fileName}`,'ok');
    showSuccess('¡Catálogo descargado!', `${catalogFinal.length} carros · ${new Date().toLocaleString('es-MX')}`);
    document.getElementById('catIcon').textContent='✅';
    document.getElementById('catText').textContent='Descargado';
    btn.disabled=false; catBtn.disabled=false;

  }catch(e){
    addLog(`ERROR: ${e.message}`,'err');
    setProgress(0,'Error — revisa el log');
    document.getElementById('catIcon').textContent='📥';
    document.getElementById('catText').textContent='Reintentar';
    btn.disabled=false; catBtn.disabled=false;
    console.error(e);
  }
});
</script>
</body>
</html>
